<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<style>
    body {
        background: #000;
        font-family: var(--font-mono);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .terminal {
        width: min(90vw, 760px);
        background: #0a0a0c;
        border-radius: 10px;
        border: 1px solid #232026;
        box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.02);
        overflow: hidden;
        opacity: 0;
        direction: ltr;
        animation: terminalIn 1s var(--ease-cinematic) forwards;
    }

    @keyframes terminalIn {
        from { opacity: 0; transform: translateY(16px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .titlebar {
        background: #16131a;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid #232026;
    }

    .dot { width: 11px; height: 11px; border-radius: 50%; }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }

    .titlebar-label {
        margin-inline-start: 10px;
        color: #6b6470;
        font-size: 0.75rem;
        letter-spacing: 0.3px;
        direction: ltr;
    }

    .code-area {
        padding: 22px 24px;
        min-height: 360px;
        font-size: 1rem;
        line-height: 1.9;
        direction: ltr;
        text-align: left;
        position: relative;
        color: #c9c4d0;
    }

    .code-line {
        white-space: pre;
        color: #c9c4d0;
    }

    .tag { color: #e06c75; }
    .attr { color: #d19a66; }
    .val  { color: #98c379; }
    .punc { color: #6b6470; }
    .cmt  { color: #5c6370; font-style: italic; }
    .txt  { color: #c9c4d0; }

    .cursor {
        display: inline-block;
        width: 8px;
        height: 1.1em;
        background: var(--color-crimson-bright);
        vertical-align: text-bottom;
        margin-inline-start: 2px;
        animation: blink 0.9s steps(1) infinite;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }

    /* Error / glitch state */
    .error-line {
        color: #ff5f56;
        opacity: 0;
        font-size: 0.85rem;
    }

    .error-line.shown {
        opacity: 1;
        animation: errorPop 0.25s var(--ease-soft);
    }

    @keyframes errorPop {
        from { transform: translateX(-6px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    .glitch-active .terminal {
        animation: shake 0.35s ease-in-out infinite;
    }

    @keyframes shake {
        0%, 100% { transform: translate(0, 0); }
        20% { transform: translate(-3px, 2px); }
        40% { transform: translate(3px, -2px); }
        60% { transform: translate(-2px, -2px); }
        80% { transform: translate(2px, 2px); }
    }

    .glitch-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        mix-blend-mode: screen;
        background:
            repeating-linear-gradient(0deg, rgba(255,0,60,0.04) 0px, rgba(255,0,60,0.04) 1px, transparent 1px, transparent 3px);
        z-index: 5;
    }

    .glitch-active .glitch-overlay {
        opacity: 1;
        animation: flicker 0.15s steps(2) infinite;
    }

    @keyframes flicker {
        0% { opacity: 0.15; }
        50% { opacity: 0.4; }
        100% { opacity: 0.15; }
    }

    .scanline-flash {
        position: fixed;
        inset: 0;
        background: #fff;
        opacity: 0;
        pointer-events: none;
        z-index: 20;
    }

    .skip-hint {
        position: fixed;
        bottom: 22px;
        inset-inline-end: 22px;
        color: var(--color-text-faint);
        font-size: 0.75rem;
        font-family: var(--font-body);
        letter-spacing: 0.3px;
        opacity: 0;
        animation: fadeInLate 1s ease forwards 1.5s;
        cursor: pointer;
        user-select: none;
        direction: rtl;
    }

    @keyframes fadeInLate {
        to { opacity: 0.6; }
    }

    .fade-out-screen {
        position: fixed;
        inset: 0;
        background: #000;
        opacity: 0;
        pointer-events: none;
        z-index: 30;
        transition: opacity 1.1s var(--ease-cinematic);
    }

    .fade-out-screen.active {
        opacity: 1;
        pointer-events: all;
    }
</style>
</head>
<body>

<div class="glitch-overlay"></div>
<div class="scanline-flash" id="flash"></div>
<div class="fade-out-screen" id="fadeOut"></div>

<div class="terminal" id="terminal">
    <div class="titlebar">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
        <div class="titlebar-label">building_something.html — compiling</div>
    </div>
    <div class="code-area" id="codeArea"></div>
</div>

<div class="skip-hint" id="skipHint">انقر للتخطي</div>

<script>
    const codeArea = document.getElementById('codeArea');
    const body = document.body;

    // Each line as pre-built HTML spans (already syntax "highlighted")
    const lines = [
        `<span class="cmt">&lt;!-- Loading experience --&gt;</span>`,
        `<span class="punc">&lt;</span><span class="tag">div</span> <span class="attr">class</span><span class="punc">=</span><span class="val">"rose-container"</span><span class="punc">&gt;</span>`,
        `  <span class="punc">&lt;</span><span class="tag">header</span> <span class="attr">class</span><span class="punc">=</span><span class="val">"intro"</span><span class="punc">&gt;</span>`,
        `    <span class="punc">&lt;</span><span class="tag">h1</span><span class="punc">&gt;</span><span class="txt">Something is loading</span><span class="punc">&lt;/</span><span class="tag">h1</span><span class="punc">&gt;</span>`,
        `  <span class="punc">&lt;/</span><span class="tag">header</span><span class="punc">&gt;</span>`,
        `  <span class="punc">&lt;</span><span class="tag">button</span> <span class="attr">id</span><span class="punc">=</span><span class="val">"startBtn"</span><span class="punc">&gt;</span><span class="txt">Begin</span><span class="punc">&lt;/</span><span class="tag">button</span><span class="punc">&gt;</span>`,
        `<span class="punc">&lt;/</span><span class="tag">div</span><span class="punc">&gt;</span>`,
        ``,
        `<span class="punc">&lt;</span><span class="tag">script</span><span class="punc">&gt;</span>`,
        `  <span class="cmt">// preparing the connection</span>`,
        `  <span class="txt">const</span> state <span class="punc">=</span> <span class="val">{</span> ready<span class="punc">:</span> <span class="val">false</span> <span class="val">}</span><span class="punc">;</span>`,
        `  <span class="txt">function</span> <span class="tag">render</span><span class="punc">(</span><span class="punc">)</span> <span class="punc">{</span>`,
        `    connect<span class="punc">(</span><span class="val">'emotions.json'</span><span class="punc">)</span><span class="punc">;</span>`,
        `    state<span class="punc">.</span>ready <span class="punc">=</span> <span class="val">true</span><span class="punc">;</span>`,
        `  <span class="punc">}</span>`,
        `<span class="punc">&lt;/</span><span class="tag">script</span><span class="punc">&gt;</span>`
    ];

    let lineIndex = 0;
    let skipped = false;

    // Render a line by building its real highlighted HTML immediately,
    // then revealing it left-to-right with a clip-path wipe driven by
    // requestAnimationFrame. This avoids slicing textContent character-by-
    // character, which breaks badly on lines that mix LTR code with RTL
    // Arabic text (the bidi algorithm reflows mid-type and can render
    // blank or scrambled). The wipe approach is simple and always visible.
    function typeLine(lineHtml, container, onDone) {
        const lineEl = document.createElement('div');
        lineEl.className = 'code-line shown';
        lineEl.style.position = 'relative';

        const inner = document.createElement('span');
        inner.innerHTML = lineHtml;
        inner.style.display = 'inline-block';
        inner.style.clipPath = 'inset(0 100% 0 0)';

        const cursor = document.createElement('span');
        cursor.className = 'cursor';

        lineEl.appendChild(inner);
        lineEl.appendChild(cursor);
        container.appendChild(lineEl);
        container.scrollTop = container.scrollHeight;

        const duration = skipped ? 0 : 420 + Math.random() * 260;
        const start = performance.now();

        function frame(now) {
            if (skipped) {
                inner.style.clipPath = 'inset(0 0 0 0)';
                onDone();
                return;
            }
            const elapsed = now - start;
            const pct = Math.min(elapsed / duration, 1);
            inner.style.clipPath = `inset(0 ${100 - pct * 100}% 0 0)`;
            if (pct < 1) {
                requestAnimationFrame(frame);
            } else {
                onDone();
            }
        }
        requestAnimationFrame(frame);
    }

    function typeAllLines() {
        if (lineIndex >= lines.length || skipped) {
            setTimeout(triggerCrash, skipped ? 200 : 600);
            return;
        }
        const prevCursor = codeArea.querySelector('.cursor');
        if (prevCursor) prevCursor.remove();

        typeLine(lines[lineIndex], codeArea, () => {
            lineIndex++;
            setTimeout(typeAllLines, 110 + Math.random() * 70);
        });
    }

    function triggerCrash() {
        const flash = document.getElementById('flash');
        flash.style.transition = 'opacity 0.08s ease';
        flash.style.opacity = '0.9';
        setTimeout(() => { flash.style.opacity = '0'; }, 90);

        body.classList.add('glitch-active');

        const errors = [
            'Uncaught ReferenceError: heart is not defined',
            'SyntaxError: unexpected token at line 247',
            'Fatal: emotions.json failed to parse',
            'TypeError: Cannot read property "feelings" of null',
            'Process terminated unexpectedly.'
        ];

        let i = 0;
        const errInterval = setInterval(() => {
            if (i >= errors.length) {
                clearInterval(errInterval);
                setTimeout(finishIntro, 900);
                return;
            }
            const e = document.createElement('div');
            e.className = 'error-line';
            e.textContent = '✗ ' + errors[i];
            codeArea.appendChild(e);
            requestAnimationFrame(() => e.classList.add('shown'));
            codeArea.scrollTop = codeArea.scrollHeight;
            i++;
        }, 260);
    }

    function finishIntro() {
        document.getElementById('fadeOut').classList.add('active');
        setTimeout(() => {
            window.location.href = 'rose.html';
        }, 1100);
    }

    function skipIntro() {
        if (skipped) return;
        skipped = true;
        triggerCrash();
    }

    document.getElementById('skipHint').addEventListener('click', skipIntro);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') skipIntro();
    });

    setTimeout(typeAllLines, 500);
</script>

</body>
</html>
