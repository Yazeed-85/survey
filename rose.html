<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Tajawal:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<style>
    body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
            radial-gradient(ellipse at 50% 70%, #1a0608 0%, #060608 55%, #000 100%);
        position: relative;
        overflow: hidden;
        cursor: pointer;
    }

    .ambient-glow {
        position: absolute;
        bottom: -10%;
        left: 50%;
        translate: -50% 0;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(179,18,46,0.35) 0%, rgba(179,18,46,0) 70%);
        filter: blur(10px);
        opacity: 0;
        animation: glowIn 3s var(--ease-cinematic) forwards 0.6s;
    }

    @keyframes glowIn {
        to { opacity: 1; }
    }

    .particles {
        position: absolute;
        inset: 0;
        pointer-events: none;
    }

    .particle {
        position: absolute;
        bottom: -10px;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--color-crimson-glow);
        box-shadow: 0 0 8px 2px rgba(255, 59, 92, 0.6);
        opacity: 0;
        animation: floatUp linear infinite;
    }

    @keyframes floatUp {
        0% { transform: translateY(0) translateX(0); opacity: 0; }
        10% { opacity: 0.8; }
        90% { opacity: 0.4; }
        100% { transform: translateY(-110vh) translateX(var(--drift, 20px)); opacity: 0; }
    }

    .rose-wrap {
        position: relative;
        z-index: 2;
        transform: scale(0.3) translateY(40px);
        opacity: 0;
        animation: roseGrow 2.4s var(--ease-cinematic) forwards 0.8s;
        filter: drop-shadow(0 0 40px rgba(255, 59, 92, 0.25));
    }

    @keyframes roseGrow {
        0% { transform: scale(0.15) translateY(60px) rotate(-4deg); opacity: 0; }
        60% { opacity: 1; }
        100% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
    }

    .rose-wrap svg {
        width: min(60vw, 320px);
        height: auto;
        animation: sway 6s ease-in-out infinite 3.2s;
        transform-origin: bottom center;
    }

    @keyframes sway {
        0%, 100% { transform: rotate(-1.2deg); }
        50% { transform: rotate(1.2deg); }
    }

    .caption {
        position: relative;
        z-index: 2;
        margin-top: 28px;
        text-align: center;
        font-family: var(--font-display);
        color: var(--color-text-dim);
        font-size: 1.15rem;
        letter-spacing: 0.5px;
        opacity: 0;
        animation: fadeUp 1.4s var(--ease-cinematic) forwards 3.4s;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 0.85; transform: translateY(0); }
    }

    .caption span {
        display: block;
        font-size: 0.85rem;
        color: var(--color-text-faint);
        margin-top: 8px;
        font-family: var(--font-body);
        font-weight: 300;
    }

    .fade-out-screen {
        position: fixed;
        inset: 0;
        background: #000;
        opacity: 0;
        pointer-events: none;
        z-index: 30;
        transition: opacity 1s var(--ease-cinematic);
    }

    .fade-out-screen.active {
        opacity: 1;
        pointer-events: all;
    }
</style>
</head>
<body>

<div class="ambient-glow"></div>
<div class="particles" id="particles"></div>

<div class="rose-wrap" id="rose">
    <svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff3b5c"/>
                <stop offset="50%" stop-color="#c81e3c"/>
                <stop offset="100%" stop-color="#7a0f22"/>
            </linearGradient>
            <linearGradient id="petalGradInner" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff6b82"/>
                <stop offset="100%" stop-color="#b3122e"/>
            </linearGradient>
            <linearGradient id="stemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#2f6b3c"/>
                <stop offset="100%" stop-color="#173d20"/>
            </linearGradient>
        </defs>

        <!-- stem -->
        <path d="M100 150 C 95 200, 105 230, 98 290" stroke="url(#stemGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
        <!-- leaf -->
        <path d="M100 200 C 80 195, 65 210, 60 230 C 85 228, 98 215, 100 200 Z" fill="#2f6b3c"/>
        <path d="M99 215 C 105 222, 112 235, 108 250 C 90 248, 82 232, 99 215 Z" fill="#255530"/>

        <!-- outer petals -->
        <path d="M100 90 C 60 95, 45 130, 60 165 C 75 190, 100 195, 100 195 C 100 195, 125 190, 140 165 C 155 130, 140 95, 100 90 Z" fill="url(#petalGrad)"/>

        <!-- mid layer petals -->
        <path d="M100 100 C 75 102, 62 125, 70 150 C 78 170, 100 178, 100 178 C 100 178, 122 170, 130 150 C 138 125, 125 102, 100 100 Z" fill="url(#petalGradInner)" opacity="0.95"/>

        <!-- petal folds (detail strokes) -->
        <path d="M100 105 C 88 115, 82 135, 92 155" stroke="#7a0f22" stroke-width="1.5" fill="none" opacity="0.5"/>
        <path d="M100 105 C 112 115, 118 135, 108 155" stroke="#7a0f22" stroke-width="1.5" fill="none" opacity="0.5"/>

        <!-- inner curled petals -->
        <path d="M100 115 C 88 120, 84 138, 95 150 C 100 154, 100 154, 100 154 C 100 154, 100 154, 105 150 C 116 138, 112 120, 100 115 Z" fill="#ff6b82"/>
        <path d="M100 120 C 94 124, 92 134, 100 142 C 108 134, 106 124, 100 120 Z" fill="#ffb3c1" opacity="0.9"/>
    </svg>
</div>

<div class="caption">
    شيء جميل ينتظرك
    <span>المسي الوردة للمتابعة</span>
</div>

<div class="fade-out-screen" id="fadeOut"></div>

<script>
    // Generate floating particles
    const particlesContainer = document.getElementById('particles');
    const PARTICLE_COUNT = 22;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const left = Math.random() * 100;
        const delay = Math.random() * 8;
        const duration = 6 + Math.random() * 6;
        const drift = (Math.random() * 60 - 30) + 'px';
        const size = 2 + Math.random() * 3;

        p.style.left = left + '%';
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.animationDelay = delay + 's';
        p.style.animationDuration = duration + 's';
        p.style.setProperty('--drift', drift);
        particlesContainer.appendChild(p);
    }

    let navigating = false;
    document.body.addEventListener('click', () => {
        if (navigating) return;
        navigating = true;
        document.getElementById('fadeOut').classList.add('active');
        setTimeout(() => {
            window.location.href = 'survey.html';
        }, 950);
    });
</script>

</body>
</html>
